version: "3.8"

services:
  vibeshield:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VIBESHIELD_DATA_DIR=/app/.vibeshield-data
      # Uncomment to enable API key authentication:
      # - VIBESHIELD_API_KEY=your-secret-key
      # Uncomment for webhook signature verification:
      # - VIBESHIELD_WEBHOOK_SECRET=your-webhook-secret
      # Logging:
      - LOG_LEVEL=info
    volumes:
      - vibeshield-data:/app/.vibeshield-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start-period: 10s
      retries: 3

volumes:
  vibeshield-data:
    driver: local
